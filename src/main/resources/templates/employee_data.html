<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body> <div class="container">

    <h1>  InActive Candidate </h1>
    <hr><br>
    <a th:href="@{/employee/form}" class="btn btn-primary">Add Employee</a><br>
    <table class="table table-dark  table-striped">
        <thead >
        <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Salary</th>
            <th>Update</th>
            <th>Delete</th>

        </tr>

        </thead>
        <tbody>
        <tr th:each="tempemployee : ${employee}" >
            <td th:text="${tempemployee.id}"/>
            <td th:text="${tempemployee.firstname}"/>
            <td th:text="${tempemployee.lastname}"/>
            <td th:text="${tempemployee.email}"/>
            <td th:text="${tempemployee.salary}"/>
            <td> <a  th:href="@{/employee/update (id=${tempemployee.id})}" class="btn btn-primary">Update</a><br>
    </td>
            <td> <a th:href="@{/employee/delete(id=${tempemployee.id})}" class="btn btn-danger" onclick="if(!confirm('are you sure for delete')) return false">Delete</a><br>
    </td>
        </tr>
        </tbody>

    </table>
</div>
</body>
</html>
