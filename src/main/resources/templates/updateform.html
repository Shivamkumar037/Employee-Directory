<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
<h1> Create Employee</h1>
<div class="container">
    <form th:action="@{/employee/update}" th:object="${employee}" method="post" class="row g-3">
        <input type="hidden" th:field="*{id}">
        <div class="col-md-6">
            <label th:for="firstname" class="form-label">First Name</label>
            <input class="form-control" id="firstname" type="text" placeholder="Enter First Name " th:field="*{firstname}">
            <span th:if="${#fields.hasErrors('firstname')}" th:errors="*{firstname}"  class="text-danger"/>

        </div>
        <div class="col-md-6">
            <label th:for="lastname" class="form-label">Last Name</label>

            <input class="form-control" id="lastname" type="text" placeholder="Enter Last Name " th:field="*{lastname}">
            <span th:if="${#fields.hasErrors('lastname')}" th:errors="*{lastname}"  class="text-danger"/>
        </div>
        <div class="col-md-6">
            <label th:for="email" class="form-label">Email</label>

            <input class="form-control" id="email" type="email" placeholder="Enter Email " th:field="*{email}">
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"  class="text-danger"/>

        </div>
        <div class="col-md-6">
            <label th:for="salary" class="form-label">Salary</label>
            <input class="form-control" id="salary" type="number" placeholder="Enter Salary" th:field="*{salary}">
            <span th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"  class="text-danger"/>
        </div>
        <div class="col-12"><button type="submit" class="btn btn-primary">Update</button></div>

    </form><br>
    <a th:href="@{/employee/}" class="btn btn-primary">Back to Employees</a><br>
</div>
</body>
</html>
